<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Restaurant — Table QR Codes</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Georgia', serif; background: #f5f0eb; padding: 32px; }
  h1 { text-align: center; font-size: 22px; color: #2c1810; margin-bottom: 6px; letter-spacing: 1px; }
  p.sub { text-align: center; font-size: 13px; color: #8a7060; margin-bottom: 32px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 24px;
    max-width: 960px;
    margin: 0 auto;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 20px 16px 16px;
    text-align: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    border: 1px solid #e8ddd5;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    break-inside: avoid;
  }
  .logo { font-size: 13px; font-weight: 700; color: #c0855a; letter-spacing: 1.5px; text-transform: uppercase; }
  .table-label { font-size: 11px; font-weight: 700; color: #8a7060; letter-spacing: 2px; text-transform: uppercase; }
  .table-num { font-size: 36px; font-weight: 700; color: #2c1810; line-height: 1; }
  .card img { width: 160px; height: 160px; border-radius: 8px; display: block; }
  .scan-text { font-size: 11px; color: #b0a090; letter-spacing: 0.5px; }

  @media print {
    body { background: #fff; padding: 16px; }
    .no-print { display: none !important; }
    .grid { grid-template-columns: repeat(4, 1fr); gap: 16px; }
    .card { box-shadow: none; border: 1.5px solid #ddd; padding: 14px 12px 12px; }
  }
</style>
</head>
<body>

<h1>My Restaurant</h1>
<p class="sub">Scan to order from your table</p>

<div class="no-print" style="text-align:center; margin-bottom:24px;">
  <button onclick="window.print()"
    style="background:#c0855a; color:#fff; border:none; padding:10px 28px; border-radius:8px; font-size:14px; font-weight:700; cursor:pointer; letter-spacing:0.5px;">
    🖨️ Print All QR Codes
  </button>
</div>

<div class="grid">
  <!-- Cards generated below -->
</div>

<script>
const BASE = window.location.origin + '/menu?table=';
const grid = document.querySelector('.grid');

for (let t = 1; t <= 22; t++) {
  const url = BASE + t;
  const qrSrc = 'https://api.qrserver.com/v1/create-qr-code/?size=160x160&margin=6&color=2c1810&bgcolor=ffffff&data=' + encodeURIComponent(url);
  grid.innerHTML += `
    <div class="card">
      <div class="logo">My Restaurant</div>
      <div class="table-label">Table</div>
      <div class="table-num">${t}</div>
      <img src="${qrSrc}" alt="QR Table ${t}" loading="lazy">
      <div class="scan-text">Scan to view menu &amp; order</div>
    </div>`;
}
</script>
</body>
</html>
