<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>My Restaurant — Menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green:     #3d9142;
      --red:       #ba1a1a;
      --orange:    #b02f00;
      --orange-l:  #ff5722;
      --brown:     #5b4039;
      --dark:      #1a1c1c;
      --gray:      #5f5e5e;
      --cream:     #f9f9f9;
      --cream2:    #f3f3f3;
      --light:     #eeeeee;
      --border:    #e2e2e2;
      --white:     #ffffff;

      /* theme tokens used explicitly for dark-mode flip */
      --nav-bg:    #ffffff;
      --nav-icon:  #9ca3af;
      --header-bg: #ffffff;
      --card-bg:   #ffffff;
      --input-bg:  #f3f3f3;
      --modal-bg:  #ffffff;
    }

    /* ── DARK MODE ── */
    @media (prefers-color-scheme: dark) {
      :root {
        --orange:    #ff6b3d;
        --orange-l:  #ff7043;
        --dark:      #f0f0f0;
        --gray:      #a0a0a8;
        --cream:     #101010;
        --cream2:    #1a1a1a;
        --light:     #2a2a2e;
        --border:    #333338;
        --white:     #1e1e22;

        --nav-bg:    #141416;
        --nav-icon:  #6b6b75;
        --header-bg: #141416;
        --card-bg:   #1e1e22;
        --input-bg:  #242428;
        --modal-bg:  #1e1e22;
      }

      /* Explicit overrides for elements with hardcoded colours */
      .rest-header        { background: var(--header-bg) !important; border-bottom-color: var(--border); }
      .search-wrap        { background: var(--header-bg) !important; border-bottom-color: var(--border); }
      .filter-bar         { background: var(--header-bg) !important; border-bottom-color: var(--border); }
      .search-box         { background: var(--input-bg) !important; }
      .search-box:focus-within { background: var(--white) !important; }
      .cat-sidebar        { background: var(--cream2) !important; border-right-color: var(--border); }
      .sidebar-btn.active { background: var(--white) !important; }
      .bottom-nav         { background: var(--nav-bg) !important; border-top-color: var(--border); }
      .nav-tab            { color: var(--nav-icon) !important; }
      .nav-tab.active     { color: var(--orange) !important; }
      .item-row           { background: var(--card-bg) !important; }
      .modal              { background: var(--modal-bg) !important; }
      .order-summary      { background: var(--light) !important; }
      .form-input         { background: var(--input-bg) !important; border-color: var(--border); color: var(--dark); }
      .form-input:focus   { border-color: var(--orange); }
      .phone-prefix       { background: var(--light) !important; border-color: var(--border); color: var(--gray); }
      .orders-header      { background: var(--header-bg) !important; border-bottom-color: var(--border); }
      .order-card         { background: var(--card-bg) !important; }
      .veg-toggle         { background: var(--input-bg) !important; border-color: var(--border); }
      .qty-ctrl           { background: var(--orange) !important; }
      .add-btn            { box-shadow: 0 3px 12px rgba(255,112,67,0.3); }
      .success-screen     { background: var(--white) !important; }
      .coupon-section     { background: var(--card-bg) !important; border-color: var(--border); }
      .coupon-input       { background: var(--input-bg) !important; color: var(--dark); }
      .modal-backdrop     { background: rgba(0,0,0,0.75); }
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--cream2);
      color: var(--dark);
      min-height: 100vh;
      padding-bottom: 150px; /* cart bar (90px) + bottom nav (56px) */
    }

    /* ── RESTAURANT HEADER ── */
    .rest-header {
      background: var(--white);
      padding: 1rem 1.25rem 0.9rem;
      position: relative;
      border-bottom: 1px solid var(--border);
      box-shadow: 0 2px 15px rgba(0,0,0,0.06);
    }
    .rest-top {
      display: flex;
      align-items: center;
      gap: 0.85rem;
    }
    .rest-logo {
      width: 48px; height: 48px;
      border-radius: 16px;
      overflow: hidden;
      flex-shrink: 0;
      border: 2px solid var(--border);
    }
    .rest-logo img { width: 100%; height: 100%; object-fit: cover; }
    .rest-name {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--dark);
      flex: 1;
      line-height: 1.15;
      letter-spacing: -0.02em;
    }
    .table-badge {
      background: rgba(176,47,0,0.08);
      color: var(--orange);
      border: 1.5px solid rgba(176,47,0,0.22);
      font-family: 'Inter', sans-serif;
      font-size: 0.68rem;
      font-weight: 600;
      padding: 0.3rem 0.7rem;
      border-radius: 9999px;
      letter-spacing: 0.05em;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .rest-meta {
      padding-top: 0.45rem;
      font-size: 0.7rem;
      color: var(--gray);
      letter-spacing: 0.02em;
    }
    .rating-badge {
      background: var(--green);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.15rem 0.45rem;
      border-radius: 6px;
      display: inline-flex; align-items: center; gap: 0.2rem;
    }

    /* ── SEARCH ── */
    .search-wrap {
      background: var(--white);
      padding: 0.65rem 1.25rem;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 40;
      box-shadow: 0 2px 15px rgba(0,0,0,0.06);
    }
    .search-box {
      display: flex;
      align-items: center;
      background: var(--cream2);
      border-radius: 9999px;
      padding: 0.55rem 1rem;
      gap: 0.5rem;
      border: 1.5px solid transparent;
      transition: border-color 0.2s, background 0.2s;
    }
    .search-box:focus-within { border-color: var(--orange); background: var(--white); }
    .search-box svg { flex-shrink: 0; color: #9ca3af; }
    .search-box input {
      border: none; background: transparent;
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem; color: var(--dark); width: 100%; outline: none;
    }
    .search-box input::placeholder { color: #9ca3af; }

    /* ── VEG FILTER ── */
    .filter-bar {
      background: var(--white);
      padding: 0.55rem 1.25rem;
      display: flex; align-items: center; gap: 0.5rem;
      border-bottom: 1px solid var(--border);
      overflow-x: auto; scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .veg-toggle {
      display: flex; align-items: center; gap: 0.38rem;
      padding: 0.32rem 0.85rem;
      border: 1.5px solid var(--border);
      border-radius: 9999px; cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem; font-weight: 500; color: var(--gray);
      background: var(--cream2); white-space: nowrap;
      transition: all 0.15s; user-select: none;
      min-height: 32px;
    }
    .veg-toggle.active { border-color: var(--green); color: var(--green); background: #f0fff1; }
    .veg-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }

    /* ── LAYOUT ── */
    .menu-layout { display: flex; align-items: flex-start; }

    /* ── CATEGORY SIDEBAR ── */
    .cat-sidebar {
      width: 88px; flex-shrink: 0;
      position: sticky; top: 48px;
      height: calc(100vh - 48px - 56px);
      overflow: hidden; /* no user scroll — controlled programmatically */
      background: var(--cream2);
      border-right: 1px solid var(--border);
    }
    .cat-sidebar::-webkit-scrollbar { display: none; }
    .sidebar-btn {
      display: flex; flex-direction: column; align-items: center;
      width: 100%; padding: 0.85rem 0.4rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.63rem; font-weight: 500; color: var(--gray);
      background: transparent; border: none;
      border-bottom: 1px solid var(--border);
      text-align: center; cursor: pointer; line-height: 1.35;
      transition: all 0.15s; position: relative;
    }
    .sidebar-btn.active {
      background: var(--white); color: var(--orange); font-weight: 700;
    }
    .sidebar-btn.active::before {
      content: '';
      position: absolute; left: 0; top: 20%; bottom: 20%;
      width: 3px; background: var(--orange-l); border-radius: 0 3px 3px 0;
    }
    .sidebar-top-btn {
      display: block; width: 100%; padding: 0.85rem 0;
      font-size: 1rem; font-weight: 700; color: var(--orange);
      background: transparent; border: none;
      border-top: 1px solid var(--border);
      cursor: pointer; text-align: center; transition: background 0.15s;
    }
    .sidebar-top-btn:active { background: var(--light); }

    /* ── MENU CONTENT ── */
    .menu-content { flex: 1; min-width: 0; overflow-x: hidden; }
    .cat-section { border-bottom: 6px solid var(--cream2); }

    .cat-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 1rem; font-weight: 700; color: var(--dark);
      padding: 1.25rem 1rem 0; letter-spacing: -0.01em;
    }
    .cat-subtitle {
      font-size: 0.72rem; color: var(--gray); font-weight: 400;
      padding: 0.2rem 1rem 0.75rem; letter-spacing: 0.01em;
    }

    /* ── ITEM ROW ── */
    .items-wrap { padding: 0.6rem 0.85rem 0.85rem; display: flex; flex-direction: column; gap: 0.6rem; }
    .item-row {
      display: flex; align-items: flex-start;
      padding: 0.9rem 1rem;
      border-bottom: none;
      gap: 0.75rem; background: var(--white);
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.04);
      transition: transform 0.12s;
    }
    .item-row:active { transform: scale(0.98); }
    .item-left { flex: 1; min-width: 0; }

    /* Cards wrap */
    .cat-section {
      border-bottom: 8px solid var(--cream2);
    }
    .items-wrap {
      padding: 0.5rem 0.75rem 0.75rem;
      display: flex; flex-direction: column; gap: 0.55rem;
    }
    .item-card {
      display: flex; align-items: flex-start;
      padding: 0.9rem 1rem;
      gap: 0.75rem;
      background: var(--white);
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.04);
      transition: transform 0.1s;
    }
    .item-card:active { transform: scale(0.98); }
    .item-card .item-left { flex: 1; min-width: 0; }

    .veg-icon {
      width: 14px; height: 14px; border-radius: 2px;
      border: 1.5px solid var(--green);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 0.3rem;
    }
    .veg-icon .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
    .veg-icon.nonveg { border-color: var(--red); }
    .veg-icon.nonveg .dot { background: var(--red); }

    .item-name {
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem; font-weight: 600; color: var(--dark);
      line-height: 1.35; margin-bottom: 0.18rem;
    }
    .item-price {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.95rem; font-weight: 700; color: var(--orange);
      margin-bottom: 0.28rem;
    }
    .item-desc {
      font-family: 'Inter', sans-serif;
      font-size: 0.73rem; color: var(--gray);
      font-weight: 400; line-height: 1.55;
    }

    /* ── ADD BUTTON ── */
    .item-right {
      flex-shrink: 0; display: flex; flex-direction: column;
      align-items: center; padding-top: 0.15rem;
    }
    .add-btn {
      border: none;
      background: var(--orange); color: #fff;
      border-radius: 9999px; width: 76px; height: 36px;
      font-family: 'Montserrat', sans-serif; font-size: 0.78rem;
      font-weight: 700; letter-spacing: 0.05em; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      gap: 0.25rem; transition: all 0.12s;
      box-shadow: 0 3px 12px rgba(176,47,0,0.28);
      min-height: 36px;
    }
    .add-btn:active { opacity: 0.85; transform: scale(0.97); }

    .qty-ctrl {
      display: flex; align-items: center;
      background: var(--orange); border-radius: 9999px;
      overflow: hidden; width: 76px; height: 36px;
      box-shadow: 0 3px 12px rgba(176,47,0,0.28);
    }
    .qty-btn {
      flex: 1; border: none; background: transparent; color: #fff;
      font-size: 1.05rem; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      height: 100%; transition: background 0.1s;
    }
    .qty-btn:active { background: rgba(0,0,0,0.12); }
    .qty-num {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.85rem; font-weight: 700; color: #fff;
      min-width: 18px; text-align: center;
    }
    .customizable { font-size: 0.6rem; color: var(--gray); margin-top: 0.3rem; text-align: center; }

    /* ── CART BAR ── */
    .cart-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--dark);
      padding: 0.85rem 1.25rem;
      display: flex; align-items: center; justify-content: space-between;
      z-index: 100;
      transform: translateY(110%);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 -4px 24px rgba(0,0,0,0.22);
    }
    .cart-bar.visible { transform: translateY(0); }
    .cart-bar-left { color: #fff; }
    .cart-item-count { font-family: 'Inter', sans-serif; font-size: 0.7rem; font-weight: 400; opacity: 0.62; margin-bottom: 0.05rem; }
    .cart-amount { font-family: 'Montserrat', sans-serif; font-size: 1.05rem; font-weight: 700; }
    .checkout-btn {
      background: var(--orange-l); color: #fff; border: none;
      padding: 0.65rem 1.4rem; border-radius: 9999px;
      font-family: 'Montserrat', sans-serif; font-size: 0.84rem; font-weight: 700;
      cursor: pointer; letter-spacing: 0.04em; transition: opacity 0.15s;
      box-shadow: 0 3px 14px rgba(255,87,34,0.45);
      min-height: 44px;
    }
    .checkout-btn:active { opacity: 0.85; }

    /* ── ORDER MODAL ── */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.58);
      z-index: 200; display: none; align-items: flex-end;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--white); border-radius: 24px 24px 0 0;
      padding: 0 1.25rem 2.5rem; width: 100%;
      max-height: 92vh; overflow-y: auto;
    }
    .modal-handle {
      width: 36px; height: 4px; background: var(--border);
      border-radius: 2px; margin: 0.9rem auto 1.2rem;
    }
    .modal-header { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 1rem; }
    .modal-back-btn {
      background: none; border: none; padding: 0.2rem;
      cursor: pointer; color: var(--dark); display: flex; align-items: center; flex-shrink: 0;
    }
    .modal-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.15rem; font-weight: 700; color: var(--dark);
      letter-spacing: -0.01em;
    }
    .order-summary {
      background: var(--light); border-radius: 12px;
      padding: 0.6rem 0.9rem; margin-bottom: 1.2rem;
    }
    .sum-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.42rem 0; font-size: 0.88rem; color: var(--dark);
      border-bottom: 1px solid var(--border);
    }
    .sum-row:last-child { border-bottom: none; }
    .sum-row.total-row {
      font-weight: 700; font-size: 0.96rem; padding-top: 0.6rem; color: var(--orange);
    }
    .form-group { margin-bottom: 1rem; }
    .form-label {
      display: block; font-family: 'Inter', sans-serif;
      font-size: 0.68rem; font-weight: 600; color: var(--gray);
      margin-bottom: 0.4rem; letter-spacing: 0.08em; text-transform: uppercase;
    }
    .form-input {
      width: 100%; padding: 0.75rem 0.95rem;
      border: 1.5px solid var(--border); border-radius: 8px;
      font-family: 'Inter', sans-serif; font-size: 0.9rem;
      background: var(--white); color: var(--dark); outline: none;
      transition: border-color 0.2s;
      min-height: 48px;
    }
    .form-input:focus { border-color: var(--orange); }
    .place-btn {
      width: 100%; padding: 1rem;
      background: var(--orange); color: #fff; border: none;
      border-radius: 9999px; font-family: 'Montserrat', sans-serif;
      font-size: 0.96rem; font-weight: 700; cursor: pointer;
      min-height: 52px;
      transition: opacity 0.15s; letter-spacing: 0.02em;
    }
    .place-btn:active { opacity: 0.88; }
    .place-btn:disabled { background: #ccc; cursor: not-allowed; }

    .phone-row { display: flex; align-items: center; gap: 0.5rem; }
    .phone-prefix {
      flex-shrink: 0; padding: 0.72rem 0.7rem;
      background: var(--light); border: 1.5px solid var(--border);
      border-radius: 10px; font-size: 0.9rem; font-weight: 500; color: var(--gray);
    }
    .phone-input { flex: 1; }
    .field-error { font-size: 0.75rem; color: #e43b4f; margin-top: 0.3rem; min-height: 1rem; }

    /* ── COUPON SECTION (on menu page) ── */
    .coupon-section {
      margin: 0.5rem 0.85rem 1.2rem;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 1rem 1rem 0.85rem;
    }
    .coupon-section-title {
      font-size: 0.68rem; font-weight: 700; color: var(--gray);
      letter-spacing: 0.08em; text-transform: uppercase;
      margin-bottom: 0.6rem;
      display: flex; align-items: center; gap: 0.4rem;
    }
    .coupon-row {
      display: flex; gap: 0.5rem; align-items: stretch;
    }
    .coupon-input {
      flex: 1;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 600;
    }
    .coupon-btn {
      flex-shrink: 0;
      padding: 0 1.1rem;
      background: var(--dark); color: #fff;
      border: 1.5px solid var(--dark); border-radius: 8px;
      font-family: 'Inter', sans-serif; font-size: 0.84rem; font-weight: 700;
      cursor: pointer; transition: opacity 0.15s; white-space: nowrap;
    }
    .coupon-btn:active { opacity: 0.8; }
    .coupon-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .coupon-feedback {
      margin-top: 0.5rem; font-size: 0.8rem;
      display: flex; align-items: center; gap: 0.35rem; min-height: 1.1rem;
    }
    .coupon-feedback.valid   { color: var(--green); font-weight: 600; }
    .coupon-feedback.invalid { color: #e43b4f; }

    /* ── HOUSE SPECIAL ── */
    .hs-star {
      color: var(--orange);
      font-size: 0.75rem;
      vertical-align: middle;
      margin-left: 2px;
    }
    .hs-badge {
      display: inline-block;
      font-family: 'Inter', sans-serif;
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--orange);
      background: rgba(176,47,0,0.08);
      border: 1px solid rgba(176,47,0,0.2);
      border-radius: 9999px;
      padding: 0.12rem 0.5rem;
      margin-left: 0.4rem;
      vertical-align: middle;
    }

    /* ── SUCCESS ── */
    .success-screen {
      display: none; position: fixed; inset: 0;
      background: var(--white); z-index: 300;
      flex-direction: column; align-items: center; justify-content: center;
      padding: 2rem; text-align: center;
    }
    .success-screen.show { display: flex; }
    .success-icon {
      width: 72px; height: 72px; background: var(--orange);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      margin-bottom: 1.4rem;
      animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes pop { from { transform: scale(0.4); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .success-screen h2 {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.75rem; font-weight: 800; color: var(--dark);
      letter-spacing: -0.02em; margin-bottom: 0.4rem;
    }
    .success-screen p { font-family: 'Inter', sans-serif; color: var(--gray); font-size: 0.9rem; line-height: 1.65; }
    .order-num {
      background: var(--cream2); color: var(--dark); padding: 0.5rem 2rem;
      border-radius: 12px; font-family: 'Montserrat', sans-serif;
      font-size: 1.4rem; font-weight: 800;
      letter-spacing: 0.08em; margin: 1rem 0 1.4rem;
    }
    .new-order-btn {
      display: block; margin-top: 0.75rem; padding: 0.75rem 2.5rem;
      background: var(--orange); color: #fff; border: none;
      border-radius: 9999px; font-family: 'Montserrat', sans-serif;
      font-size: 0.9rem; font-weight: 700; cursor: pointer;
      letter-spacing: 0.04em; min-height: 48px;
    }

    /* ── DESSERT 3D STAGE ── */
    .dessert-stage {
      position: relative;
      width: 100%;
      height: 230px;
      border-radius: 18px;
      overflow: hidden;
      clip-path: inset(0 0 0 0 round 18px);
      -webkit-clip-path: inset(0 0 0 0 round 18px);
      contain: paint;
      transform: translateZ(0);
      -webkit-transform: translateZ(0);
      margin-bottom: 1.2rem;
    }
    .stage-bg {
      position: absolute;
      inset: -6px;
      background-image: url('/table-bg.jpg');
      background-size: cover;

    .stage-track {

      inset: 0;

    .slab {
      position: absolute;
      top: 50%; left: 50%;
      width: 70px;
      margin-left: -35px;

<script>
// Always step by exactly 1 on arrow keys for all number inputs
document.addEventListener('keydown', e => {
  if (e.target.type !== 'number') return;
  if (e.key !== 'ArrowUp' && e.key !== 'ArrowDown') return;
  e.preventDefault();
  const v = parseFloat(e.target.value) || 0;
  const min = parseFloat(e.target.min ?? '-Infinity');
  const next = e.key === 'ArrowUp' ? v + 1 : Math.max(isNaN(min) ? -Infinity : min, v - 1);
  e.target.value = +next.toFixed(2);
  e.target.dispatchEvent(new Event('input', { bubbles: true }));
  e.target.dispatchEvent(new Event('change', { bubbles: true }));
}, true);
</script>

  let nonVegOnly = false;
  let scrollSpyObserver = null;

  const NON_VEG_KEYWORDS = ['chicken', 'egg', 'mutton', 'prawn', 'fish', 'beef', 'pork', 'keema', 'bonafide'];

  const DESSERT_IMAGES = {
    'Mango Tres Leches':     '/ds1.png',
    'Mango Misu':            '/ds2.png',
    'Tiramisu':              '/ds3.png',
    'Chocolate Croissant':   '/ds4.png',
    'Belgian Chocolate Cake':'/ds5.png',
  };

  const MATCHA_IMAGES = {
    'Mango Matcha Latte':      '/mt1.jpg',
    'Matcha Latte':            '/mt2.jpg',
    'Matcha Cloud':            '/mt3.jpg',
    'Strawberry Matcha Latte': '/mt4.jpg',
    'Yuzu':                    '/coldbrews.png',
    'YUZU':                    '/coldbrews.png',
  };

  function isNonVeg(name, desc = '') {
    const text = (name + ' ' + desc).toLowerCase();
    return NON_VEG_KEYWORDS.some(k => text.includes(k));
  }

  // ── DESSERT 3D STAGE (Three.js) ───────────────────────────────────────────
  let stageEntered  = false;
  let focusedIds    = [];
  let _threeInited  = false;

  function renderDessertStage(items) {
    window._dessertItems = items;
    _threeInited = false;
    if (window._threeCleanup) window._threeCleanup();
    const slabs = items.slice(0,5).map((item, i) => {
      const src = DESSERT_IMAGES[item.name] || `/ds${i+1}.png`;
      const label = item.name.split(' ').slice(0,2).join(' ');
      return `<div class="slab slab-pos-${i}" data-id="${item.id}" onclick="focusDessert(${item.id})">
        <img src="${src}" alt="${item.name}">
        <div class="slab-label">${label}</div>
      </div>`;
    }).join('');
    return `
      <div class="dessert-stage" id="dessertStage">
        <div class="stage-bg"></div>
        <div class="stage-bg-overlay"></div>
        <div class="stage-track" id="stageTrack">${slabs}</div>
        <div class="stage-hint" id="stageHint">tap a dessert</div>
      </div>`;
  }

  function triggerStageEntrance() {
    if (stageEntered) return;
    stageEntered = true;
    focusedIds = [];
    if (window._threeEntrance) window._threeEntrance();
  }

  function focusDessert(itemId) {
    const wasFocused = focusedIds.includes(itemId);
    if (wasFocused) focusedIds = focusedIds.filter(id => id !== itemId);
    else            focusedIds.push(itemId);

    if (window._threeFocus) window._threeFocus(itemId);

    const row = document.getElementById(`card-${itemId}`);
    if (row) row.classList.toggle('active-row', !wasFocused);

    const hint = document.getElementById('stageHint');
    if (hint) hint.classList.remove('visible');
  }

  function triggerStageExit(callback) {
    if (window._threeExit) window._threeExit(callback);
    else callback && callback();
  }

  function _resetStageCards() {
    focusedIds = [];
    if (window._threeReset) window._threeReset();
  }

  // Called by IntersectionObserver AND by module script (race-condition guard)
  function _initStageWhenReady(tries) {
    const track = document.getElementById('stageTrack');
    if (!track) return;
    if (window._threeInit) {
      if (!_threeInited) {
        window._threeInit(track, window._dessertItems || []);
        _threeInited = true;
      }
      if (!stageEntered) triggerStageEntrance();
    } else if (tries < 20) {
      setTimeout(() => _initStageWhenReady(tries + 1), 80);
    }
  }
  window._initStageWhenReady = () => _initStageWhenReady(0);

  function watchDessertStage() {
    const stage = document.getElementById('dessertStage');
    if (!stage) return;
    stageEntered = false;
    const obs = new IntersectionObserver(entries => {
      if (entries[0].isIntersecting) {
        _initStageWhenReady(0);
        obs.disconnect();
      }
    }, { threshold: 0.15 });
    obs.observe(stage);
  }

  const params = new URLSearchParams(window.location.search);
  tableNumber = parseInt(params.get('table')) || 1;
  document.getElementById('tableBadge').textContent = `Table ${tableNumber}`;

  // ── ORDERING MODE ──────────────────────────────────────────────────────────
  let orderingEnabled = false;

  function applyOrderingMode(enabled) {
    orderingEnabled = enabled;
    // Cart bar + bottom nav orders tab
    document.getElementById('cartBar').style.display    = enabled ? '' : 'none';
    document.getElementById('navOrders').style.display  = enabled ? '' : 'none';
    // If orders tab is open but ordering just got disabled, switch to menu
    if (!enabled && currentTab === 'orders') switchTab('menu');
    // Re-render menu so ADD buttons show/hide
    if (menu.length) renderMenu();
    // Adjust body padding — no cart bar means only nav height needed
    document.body.style.paddingBottom = enabled ? '150px' : '70px';
  }

  fetch('/api/settings').then(r => r.json()).then(rows => {
    const val = Array.isArray(rows)
      ? rows.find(r => r.key === 'ordering_enabled')?.value
      : rows.ordering_enabled;
    applyOrderingMode(val !== '0' && val !== 0 && val !== false);
  }).catch(() => applyOrderingMode(true)); // default ON if fetch fails

  fetch('/api/menu').then(r => r.json()).then(data => {
    menu = data;
    renderMenu();
  });

  function scrollToTop() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
    document.getElementById('catSidebar').scrollTo({ top: 0, behavior: 'smooth' });
    const firstBtn = document.querySelector('.sidebar-btn');
    if (firstBtn) {
      document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
      firstBtn.classList.add('active');
    }
  }

  function renderSidebar(cats) {
    const list = cats || menu;
    document.getElementById('catSidebar').innerHTML =
      `<button class="sidebar-top-btn" onclick="scrollToBottom()" title="Jump to bottom" style="border-top:none;border-bottom:1px solid var(--border);">↓</button>` +
      list.map((cat, i) => {
        const isCB = cat.name.toLowerCase().includes('cold brew');
        const action = isCB ? `openColdBrewScreen()` : `scrollToCat(${cat.id},this)`;
        return `<button class="sidebar-btn${i===0?' active':''}" id="side-${cat.id}" data-cat="${cat.id}" onclick="${action}">${cat.name}</button>`;
      }).join('') +
      `<button class="sidebar-top-btn" onclick="scrollToTop()" title="Back to top">↑</button>`;
  }

  function scrollToBottom() {
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  }

  function toggleVeg() {
    vegOnly = !vegOnly;
    if (vegOnly) nonVegOnly = false;
    document.getElementById('vegToggle').classList.toggle('active', vegOnly);
    document.getElementById('nonvegToggle').classList.toggle('active', nonVegOnly);
    renderMenu();
  }

  function toggleNonVeg() {
    nonVegOnly = !nonVegOnly;
    if (nonVegOnly) vegOnly = false;
    document.getElementById('nonvegToggle').classList.toggle('active', nonVegOnly);
    document.getElementById('vegToggle').classList.toggle('active', vegOnly);
    renderMenu();
  }

  function filterMenu() {
    renderMenu();
  }

  function renderMenu() {
    const query = document.getElementById('searchInput').value.trim().toLowerCase();
    let html = '';
    let anyVisible = false;
    const visibleCats = [];

    for (const cat of menu) {
      // hide drink categories when veg/non-veg filter is active
      if ((vegOnly || nonVegOnly) && !FOOD_CATS.includes(cat.name)) continue;

      const items = cat.items.filter(item => {
        if (vegOnly && isNonVeg(item.name, item.description)) return false;
        if (nonVegOnly && !isNonVeg(item.name, item.description)) return false;
        if (query && !item.name.toLowerCase().includes(query) && !(item.description||'').toLowerCase().includes(query)) return false;
        return true;
      });
      if (items.length === 0) continue;
      anyVisible = true;
      visibleCats.push(cat);
      const isColdBrew = cat.name.toLowerCase().includes('cold brew');
      html += `
        <div class="cat-section" id="cat-${cat.id}" data-cat="${cat.id}">
          ${isColdBrew
            ? `${renderColdBrewHero(items, cat.id)}`
            : `<div class="cat-title">${cat.name}</div>
               <div class="cat-subtitle">${items.length} item${items.length!==1?'s':''}</div>
               <div class="items-wrap">${items.map(item => renderItemRow(item, cat.name, false)).join('')}</div>`
          }
        </div>`;
    }

    document.getElementById('menuContent').innerHTML = html + `<div class="empty-search" id="emptySearch" style="display:${anyVisible?'none':'block'}">No items found</div>`;
    if (query) return; // search results don't need sidebar/scrollspy
    renderSidebar(visibleCats);
    setupScrollSpy();
  }

  const FOOD_CATS = ['Global Fusions', 'Toasties', 'Pasta', 'Sandwiches', 'Mains', 'Special Rice Bowls', 'Sides', 'Sweet', 'Desserts'];

  // ── COLD BREW FULLSCREEN ──────────────────────────────────────────────────
  // ── COLD BREW FULLSCREEN ─────────────────────────────────────────────────
  function openColdBrewScreen() {
    const cat = menu.find(c => c.name.toLowerCase().includes('cold brew'));
    if (!cat) return;
    buildCbBottom(cat.items);
    document.getElementById('cbScreen').classList.add('open');
    document.body.style.overflow = 'hidden';
    const img = document.querySelector('.cb-photo-img');
    if (img && img.complete && img.naturalWidth) positionCbZones();
    else if (img) img.onload = positionCbZones;
  }

  function positionCbZones() {
    const img = document.querySelector('.cb-photo-img');
    const photo = document.querySelector('.cb-photo');
    if (!img || !photo || !img.naturalWidth) return;
    const pW = photo.clientWidth, pH = photo.clientHeight;
    const scale = Math.min(pW / img.naturalWidth, pH / img.naturalHeight);
    const rendW = img.naturalWidth * scale;
    const rendH = img.naturalHeight * scale;
    const offX = (pW - rendW) / 2;
    const offY = (pH - rendH) / 2;
    document.querySelectorAll('.cb-zone').forEach((zone, i) => {
      const p = CB_POSITIONS[i]; if (!p) return;
      zone.style.left = (offX + parseFloat(p.left) / 100 * rendW) + 'px';
      zone.style.top  = (offY + parseFloat(p.top)  / 100 * rendH) + 'px';
      zone.style.transform = 'translate(-50%, -50%)';
    });
  }

  function closeColdBrewScreen() {
    document.getElementById('cbScreen').classList.remove('open');
    document.body.style.overflow = '';
  }

  // Horizontal positions of the 5 drink names printed in coldbrews.png
  // top% = just below the printed label text at the bottom of the photo
  // Positions tuned to red-dot markers on coldbrews.png
  const CB_POSITIONS = [
    { left: '10%', top: '91%' },   // Yuzu cold brew
    { left: '27%', top: '93%' },   // Lavender Coldbrew
    { left: '45%', top: '91%' },   // straight up cold brew
    { left: '63%', top: '91%' },   // Basil cold brew
    { left: '80%', top: '89%' },   // Fridge cigarette cold brew
  ];

  function buildCbBottom(items) {
    const zones = document.getElementById('cbZones');
    if (!zones) return;
    zones.innerHTML = items.map((item, i) => {
      const qty = cart[item.id]?.qty || 0;
      const unavail = item.is_available === false;
      const pos = CB_POSITIONS[i] || { left: `${10 + i * 18}%`, top: '87%' };
      return `
        <div class="cb-zone${qty > 0 ? ' cb-added' : ''}" id="cbz-${item.id}"
             onclick="cbZoneTap(${item.id})">
          <div class="cb-zone-btn">${qty > 0 ? '✓' : unavail ? '—' : '+'}</div>
        </div>`;
    }).join('');
    const total = items.reduce((s, i) => s + (cart[i.id]?.qty || 0), 0);
    const btn = document.getElementById('cbViewCart');
    if (btn) btn.classList.toggle('show', total > 0);
    requestAnimationFrame(positionCbZones);
  }

  function cbZoneTap(itemId) {
    if (!orderingEnabled) return;
    const item = getItemById(itemId);
    if (!item || item.is_available === false) return;
    addItem(itemId);
    const cat = menu.find(c => c.name.toLowerCase().includes('cold brew'));
    if (!cat) return;
    buildCbBottom(cat.items);
    const el = document.getElementById('cbz-' + itemId);
    if (el) { el.classList.remove('flash'); void el.offsetWidth; el.classList.add('flash'); }
  }

  function renderColdBrewHero(items, catId) {
    return `
      <div style="position:relative;width:100%;height:200px;overflow:hidden;cursor:pointer;"
           onclick="openColdBrewScreen()">
        <img src="/coldbrews.png" alt="Cold Brews"
             style="width:100%;height:100%;object-fit:cover;object-position:center 25%;display:block;pointer-events:none;">
        <div style="position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0.05) 30%,rgba(0,0,0,0.65) 100%)"></div>
        <div style="position:absolute;top:14px;left:16px;font-family:'Montserrat',sans-serif;font-size:1.3rem;font-weight:800;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,0.4);letter-spacing:-0.02em">Cold Brews ☕</div>
        <div style="position:absolute;bottom:0;left:0;right:0;padding:14px 16px;display:flex;align-items:center;justify-content:space-between">
          <div style="font-family:'Inter',sans-serif;font-size:0.72rem;font-weight:600;color:rgba(255,255,255,0.8);letter-spacing:0.12em;text-transform:uppercase">Tap to explore</div>
          <div style="background:rgba(255,255,255,0.18);backdrop-filter:blur(8px);border-radius:9999px;padding:6px 16px;font-family:'Montserrat',sans-serif;font-size:0.76rem;font-weight:700;color:#fff">View All →</div>
        </div>
      </div>`;
  }

  function cbAddDrink(itemId) { cbZoneTap(itemId); }

  function renderItemRow(item, catName = '', isDesserts = false) {
    const qty = cart[item.id]?.qty || 0;
    const unavailable = item.is_available === false;
    const nv = isNonVeg(item.name, item.description);
    const vegHtml = FOOD_CATS.includes(catName)
      ? `<div class="veg-icon${nv?' nonveg':''}"><div class="dot"></div></div>`
      : '';
    const ctrl = !orderingEnabled
      ? ''
      : unavailable
        ? `<span style="display:inline-flex;align-items:center;gap:4px;font-family:'Inter',sans-serif;font-size:0.68rem;font-weight:600;color:#92400e;background:#fef3c7;border:1px solid #fde68a;padding:5px 10px;border-radius:999px;white-space:nowrap;letter-spacing:0.03em;">
             <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
             Temporarily Unavailable
           </span>`
        : qty === 0
          ? `<button class="add-btn" onclick="addItem(${item.id})"><span>+</span> ADD</button>`
          : `<div class="qty-ctrl">
               <button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button>
               <span class="qty-num">${qty}</span>
               <button class="qty-btn" onclick="changeQty(${item.id},1)">+</button>
             </div>`;
    // Inline photos for Matcha, Desserts, and other special items
    const itemImg = MATCHA_IMAGES[item.name] || DESSERT_IMAGES[item.name];
    const inlineImg = itemImg
      ? `<div style="width:100%;overflow:hidden;border-radius:12px;margin-top:0.75rem;${unavailable?'opacity:0.4;filter:grayscale(1);':''}">
           <img src="${itemImg}" alt="${item.name}" style="width:100%;max-width:100%;height:180px;object-fit:cover;display:block;">
         </div>`
      : '';
    const hsBadge = item.is_house_special
      ? `<span class="hs-badge">✦ House Special</span>`
      : '';
    // If item has an inline image, wrap row + image in a plain block — image is a sibling, NOT inside the flex row
    if (inlineImg) {
      return `
        <div id="card-${item.id}" style="background:var(--white);border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.04);overflow:hidden;${unavailable?'opacity:0.72;':''}">
          <div class="item-row${isDesserts ? ' dessert-row' : ''}" style="border-radius:0;box-shadow:none;">
            <div class="item-left">
              ${vegHtml}
              <div class="item-name" style="${unavailable?'color:#8a7070;':''}">${item.name}${item.is_house_special ? ' <span class="hs-star">✦</span>' : ''}</div>
              <div class="item-price">₹${item.price}${hsBadge}</div>
              ${item.description ? `<div class="item-desc">${item.description}</div>` : ''}
            </div>
            <div class="item-right" id="ctrl-${item.id}">${ctrl}</div>
          </div>
          <div style="padding:0 1rem 1rem;">
            <img src="${itemImg}" alt="${item.name}" style="width:100%;height:auto;display:block;border-radius:12px;${unavailable?'opacity:0.4;filter:grayscale(1);':''}">
          </div>
        </div>`;
    }
    return `
      <div class="item-row${isDesserts ? ' dessert-row' : ''}" id="card-${item.id}" style="${unavailable?'opacity:0.72;':''}">
        <div class="item-left">
          ${vegHtml}
          <div class="item-name" style="${unavailable?'color:#8a7070;':''}">${item.name}${item.is_house_special ? ' <span class="hs-star">✦</span>' : ''}</div>
          <div class="item-price">₹${item.price}${hsBadge}</div>
          ${item.description ? `<div class="item-desc">${item.description}</div>` : ''}
        </div>
        <div class="item-right" id="ctrl-${item.id}">${ctrl}</div>
      </div>`;
  }

  function getItemById(id) {
    for (const cat of menu) {
      const item = cat.items.find(i => i.id === id);
      if (item) return item;
    }
  }

  function addItem(id) {
    const item = getItemById(id);
    if (item.is_available === false) return;
    cart[id] = { id, name: item.name, price: item.price, qty: (cart[id]?.qty || 0) + 1 };
    refreshCtrl(id);
    updateCartBar();
  }

  function changeQty(id, delta) {
    const qty = (cart[id]?.qty || 0) + delta;
    if (qty <= 0) { delete cart[id]; }
    else {
      const item = getItemById(id);
      cart[id] = { id, name: item.name, price: item.price, qty };
    }
    refreshCtrl(id);
    updateCartBar();
  }

  function refreshCtrl(id) {
    const qty = cart[id]?.qty || 0;
    const el = document.getElementById(`ctrl-${id}`);
    if (el) {
      el.innerHTML = qty === 0
        ? `<button class="add-btn" onclick="addItem(${id})"><span>+</span> ADD</button>`
        : `<div class="qty-ctrl">
             <button class="qty-btn" onclick="changeQty(${id},-1)">−</button>
             <span class="qty-num">${qty}</span>
             <button class="qty-btn" onclick="changeQty(${id},1)">+</button>
           </div>`;
    }
    // Also refresh fullscreen zone if open
    const cbZone = document.getElementById(`cbz-${id}`);
    if (cbZone) {
      const cat = menu.find(c => c.name.toLowerCase().includes('cold brew'));
      if (cat) buildCbBottom(cat.items);
    }
  }

  function calcDiscount(subtotal) {
    if (!_appliedCoupon) return 0;
    if (_appliedCoupon.type === 'percent')
      return Math.min(subtotal * _appliedCoupon.value / 100, subtotal);
    return Math.min(_appliedCoupon.value, subtotal);
  }

  function updateCartBar() {
    const items = Object.values(cart);
    const count = items.reduce((s,i) => s + i.qty, 0);
    const subtotal = items.reduce((s,i) => s + i.price * i.qty, 0);
    const discount = calcDiscount(subtotal);
    const total = subtotal - discount;
    document.getElementById('cartCountLbl').textContent = `${count} item${count!==1?'s':''}`;
    document.getElementById('cartTotalLbl').textContent = `₹${total}`;
    document.getElementById('cartBar').classList.toggle('visible', count > 0);
  }

  function scrollToCat(id, btn) {
    document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
    if (btn) { btn.classList.add('active'); scrollSidebarToActive(btn); }
    const el = document.getElementById(`cat-${id}`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    // re-trigger dessert stage entrance if scrolling to Desserts
    const stage = document.getElementById('dessertStage');
    if (stage && el && el.contains(stage)) {
      stageEntered = false;
      _resetStageCards();
      setTimeout(triggerStageEntrance, 350);
    }
  }

  function setupScrollSpy() {
    if (scrollSpyObserver) { scrollSpyObserver.disconnect(); scrollSpyObserver = null; }
    scrollSpyObserver = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          const id = e.target.dataset.cat;
          document.querySelectorAll('.sidebar-btn').forEach(b => {
            b.classList.toggle('active', b.dataset.cat === id);
          });
          scrollSidebarToActive(document.getElementById(`side-${id}`));
        }
      });
    }, { rootMargin: '-100px 0px -55% 0px', threshold: 0 });

    setTimeout(() => {
      document.querySelectorAll('.cat-section').forEach(s => scrollSpyObserver.observe(s));
    }, 400);
  }


  // Sidebar touch → scroll main page; sidebar scrolls programmatically via scrollspy
  ;(function () {
    const sidebar = document.getElementById('catSidebar');
    let startY = 0, startPageY = 0;
    sidebar.addEventListener('touchstart', e => {
      startY     = e.touches[0].clientY;
      startPageY = window.scrollY;
    }, { passive: true });
    sidebar.addEventListener('touchmove', e => {
      window.scrollTo(0, startPageY + (startY - e.touches[0].clientY));
    }, { passive: true });
  })();

  function scrollSidebarToActive(btn) {
    const sidebar = document.getElementById('catSidebar');
    if (!btn || !sidebar) return;
    // Centre the active button within the sidebar's visible area
    const target = btn.offsetTop - sidebar.clientHeight / 2 + btn.clientHeight / 2;
    sidebar.scrollTop = Math.max(0, target);
  }

  function onPhoneInput() {
    const phone = document.getElementById('custPhone').value;
    document.getElementById('phoneError').textContent = '';
    updatePlaceBtn();
  }

  function updatePlaceBtn() {
    const name  = document.getElementById('custName').value.trim();
    const phone = document.getElementById('custPhone').value.trim();
    // Phone is optional — only validate format if something was entered
    const phoneOk = !phone || /^[6-9]\d{9}$/.test(phone);
    if (phone && !phoneOk) {
      document.getElementById('phoneError').textContent = 'Enter a valid 10-digit number';
    } else {
      document.getElementById('phoneError').textContent = '';
    }
    document.getElementById('placeBtn').disabled = !(name && phoneOk);
  }

  function openCheckout() {
    const open = () => {
      updateOrderSummary();
      document.getElementById('orderModal').classList.add('open');
    };
    const stage = document.getElementById('dessertStage');
    if (stage) triggerStageExit(open);
    else open();
  }

  document.getElementById('orderModal').addEventListener('click', function(e) {
    if (e.target === this) {
      this.classList.remove('open');
      resetCoupon();
      stageEntered = false;
      _resetStageCards();
      setTimeout(triggerStageEntrance, 200);
    }
  });

  async function placeOrder() {
    const btn = document.getElementById('placeBtn');
    btn.disabled = true; btn.textContent = 'Placing…';
    try {
      const res = await fetch('/api/orders', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          table_number: tableNumber,
          customer_name: document.getElementById('custName').value.trim(),
          customer_phone: document.getElementById('custPhone').value.trim(),
          notes: document.getElementById('orderNotes').value.trim(),
          coupon_code: _appliedCoupon?.code || '',
          discount: _appliedCoupon ? calcDiscount(Object.values(cart).reduce((s,i)=>s+i.price*i.qty,0)) : 0,
          items: Object.values(cart).map(i => ({ id: i.id, name: i.name, price: i.price, quantity: i.qty }))
        })
      });
      const data = await res.json();
      if (data.success || data.order_id || data.order) {
        const orderId = data.order_id || data.order?.id;
        document.getElementById('orderModal').classList.remove('open');
        const orderIdStr = String(orderId).padStart(4,'0');
        document.getElementById('successNum').textContent = `#${orderIdStr}`;
        const wait = data.wait_minutes || 10;
        document.getElementById('successWait').textContent =
          `Ready in about ${wait}–${wait + 5} min. Sit back & relax ☕`;
        document.getElementById('trackOrderBtn').href = `/status?order=${orderId}`;
        document.getElementById('successScreen').classList.add('show');
        // Redeem the coupon atomically after order success
        if (_appliedCoupon?.code) {
          fetch('/api/coupons/redeem', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ code: _appliedCoupon.code })
          }).catch(() => {}); // fire and forget — order already placed
        }
        cart = {};
        updateCartBar();
        resetCoupon();
        ordersLoaded = false;
      } else {
        const msg = data.error || 'Something went wrong. Please try again.';
        alert(msg);
        btn.disabled = false; btn.textContent = 'Place Order';
      }
    } catch(err) {
      alert('Connection error. Please try again.');
      btn.disabled = false; btn.textContent = 'Place Order';
    }
  }

  function resetOrder() {
    document.getElementById('successScreen').classList.remove('show');
    document.getElementById('custName').value = '';
    document.getElementById('custPhone').value = '';
    document.getElementById('orderNotes').value = '';
    document.getElementById('phoneError').textContent = '';
    document.getElementById('placeBtn').disabled = true;
    resetCoupon();
  }

  // ── COUPON VERIFY + REDEEM ────────────────────────────────────────────────
  function onCouponInput() {
    const val = document.getElementById('couponInput').value.trim();
    document.getElementById('couponBtn').disabled = val.length < 2;
    document.getElementById('couponFeedback').className = 'coupon-feedback';
    document.getElementById('couponFeedback').innerHTML = '';
    document.getElementById('couponBtn').textContent = 'Verify';
    // Clear applied coupon and refresh totals
    if (_appliedCoupon) { _appliedCoupon = null; updateOrderSummary(); }
    const rb = document.getElementById('redeemBtn');
    if (rb) rb.style.display = 'none';
  }

  async function applyCoupon() {
    const code = document.getElementById('couponInput').value.trim();
    if (!code) return;
    const fb  = document.getElementById('couponFeedback');
    const btn = document.getElementById('couponBtn');
    btn.disabled = true; btn.textContent = '…';
    fb.className = 'coupon-feedback'; fb.innerHTML = 'Checking…';
    const rb = document.getElementById('redeemBtn');
    if (rb) rb.style.display = 'none';
    try {
      const res  = await fetch(`/api/coupons/verify?code=${encodeURIComponent(code)}`);
      const data = await res.json();
      if (data.valid) {
        const code = document.getElementById('couponInput').value.trim().toUpperCase();
        const subtotal = Object.values(cart).reduce((s,i) => s + i.price * i.qty, 0);
        const discAmt = data.discount_type === 'percent'
          ? Math.min(subtotal * data.discount_value / 100, subtotal)
          : Math.min(data.discount_value, subtotal);
        _appliedCoupon = { code, type: data.discount_type, value: data.discount_value, amount: discAmt };
        const remark = data.discount_type === 'percent'
          ? `${data.discount_value}% off — you save ₹${discAmt.toFixed(0)}`
          : `₹${data.discount_value} flat off`;
        fb.className = 'coupon-feedback valid';
        fb.innerHTML = `<span>✓</span> ${remark}`;
        btn.textContent = '✓ Valid';
        updateOrderSummary(); // reflect discount immediately
        // Show Redeem button
        if (rb) { rb.style.display = 'inline-flex'; rb.disabled = false; rb.textContent = 'Redeem'; }
      } else {
        fb.className = 'coupon-feedback invalid';
        fb.innerHTML = `<span>✕</span> ${data.error}`;
        btn.disabled = false; btn.textContent = 'Verify';
      }
    } catch {
      fb.className = 'coupon-feedback invalid';
      fb.innerHTML = '<span>✕</span> Could not verify. Try again.';
      btn.disabled = false; btn.textContent = 'Verify';
    }
  }

  async function redeemCoupon() {
    const code = document.getElementById('couponInput').value.trim();
    if (!code) return;
    const fb  = document.getElementById('couponFeedback');
    const rb  = document.getElementById('redeemBtn');
    rb.disabled = true; rb.textContent = '…';
    try {
      const res  = await fetch('/api/coupons/redeem', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code }),
      });
      const data = await res.json();
      if (data.success) {
        fb.className = 'coupon-feedback valid';
        fb.innerHTML = `<span>✓</span> Coupon redeemed! Show this to your waiter.`;
        rb.style.display = 'none';
        document.getElementById('couponBtn').style.display = 'none';
        document.getElementById('couponInput').disabled = true;
      } else {
        fb.className = 'coupon-feedback invalid';
        fb.innerHTML = `<span>✕</span> ${data.error}`;
        rb.disabled = false; rb.textContent = 'Redeem';
      }
    } catch {
      fb.className = 'coupon-feedback invalid';
      fb.innerHTML = '<span>✕</span> Could not redeem. Try again.';
      rb.disabled = false; rb.textContent = 'Redeem';
    }
  }

  function updateOrderSummary() {
    const items    = Object.values(cart);
    const subtotal = items.reduce((s,i) => s + i.price * i.qty, 0);
    const discount = calcDiscount(subtotal);
    const total    = subtotal - discount;

    const itemRows = items.map(i => `
      <div class="sum-row">
        <div style="display:flex;align-items:center;gap:0.5rem;flex:1;min-width:0">
          <div style="display:flex;align-items:center;border:1.5px solid var(--border);border-radius:9999px;overflow:hidden;flex-shrink:0">
            <button onclick="sumChangeQty(${i.id},-1)"
              style="width:28px;height:28px;border:none;background:none;font-size:1rem;font-weight:600;color:var(--orange);cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1">−</button>
            <span style="font-family:'Montserrat',sans-serif;font-size:0.82rem;font-weight:700;color:var(--dark);min-width:18px;text-align:center">${i.qty}</span>
            <button onclick="sumChangeQty(${i.id},1)"
              style="width:28px;height:28px;border:none;background:none;font-size:1rem;font-weight:600;color:var(--orange);cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1">+</button>
          </div>
          <span style="font-size:0.86rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${i.name}</span>
        </div>
        <span style="font-weight:600;flex-shrink:0;margin-left:0.5rem">₹${i.price * i.qty}</span>
      </div>`).join('');

    const discountRow = discount > 0 ? `
      <div class="sum-row" style="color:var(--green)">
        <span>🏷 Coupon (${_appliedCoupon.code})</span>
        <span>−₹${discount.toFixed(0)}</span>
      </div>` : '';

    const subtotalRow = discount > 0 ? `
      <div class="sum-row" style="font-size:.82rem;color:var(--gray)">
        <span>Subtotal</span><span>₹${subtotal.toFixed(0)}</span>
      </div>` : '';

    const totalRow = `<div class="sum-row total-row"><span>Total</span><span>₹${total.toFixed(0)}</span></div>`;

    const el = document.getElementById('orderSummary');
    if (el) el.innerHTML = itemRows + subtotalRow + discountRow + totalRow;
    updatePlaceBtn();
    updateCartBar(); // keep cart bar in sync
  }

  function sumChangeQty(id, delta) {
    changeQty(id, delta);
    updateOrderSummary();
  }

  function resetCoupon() {
    _appliedCoupon = null;
    const inp = document.getElementById('couponInput');
    const fb  = document.getElementById('couponFeedback');
    const btn = document.getElementById('couponBtn');
    const rb  = document.getElementById('redeemBtn');
    if (inp) { inp.value = ''; inp.disabled = false; }
    if (fb)  { fb.className = 'coupon-feedback'; fb.innerHTML = ''; }
    if (btn) { btn.disabled = true; btn.textContent = 'Verify'; btn.style.display = ''; }
    if (rb)  { rb.style.display = 'none'; rb.disabled = false; rb.textContent = 'Redeem'; }
  }

  // ── ORDERS TAB ────────────────────────────────────────────────────────────
  let tableOrders = [];
  let ordersLoaded = false;
  let currentTab = 'menu';

  document.getElementById('ordersTableChip').textContent = 'Table ' + tableNumber;

  function switchTab(tab) {
    currentTab = tab;
    const menuBtn    = document.getElementById('navMenu');
    const ordersBtn  = document.getElementById('navOrders');
    const panel      = document.getElementById('ordersPanel');
    const menuLayout = document.querySelector('.menu-layout');
    const searchWrap = document.querySelector('.search-wrap');
    const filterBar  = document.querySelector('.filter-bar');

    if (tab === 'orders') {
      menuBtn.classList.remove('active');
      ordersBtn.classList.add('active');
      panel.classList.add('show');
      searchWrap.style.display = 'none';
      filterBar.style.display  = 'none';
      menuLayout.style.display = 'none';
      document.getElementById('couponSection').style.display = 'none';
      // hide cart bar while on orders tab
      document.getElementById('cartBar').classList.remove('visible');
      document.getElementById('ordersBadge').style.display = 'none';
      if (!ordersLoaded) loadTableOrders();
    } else {
      ordersBtn.classList.remove('active');
      menuBtn.classList.add('active');
      panel.classList.remove('show');
      searchWrap.style.display = '';
      filterBar.style.display  = '';
      menuLayout.style.display = '';
      document.getElementById('couponSection').style.display = '';
      // restore cart bar if items in cart
      updateCartBar();
    }
  }

  async function loadTableOrders() {
    const loading = document.getElementById('ordersLoading');
    const body    = document.getElementById('ordersBody');
    loading.style.display = 'flex';
    body.innerHTML = '';
    try {
      const res = await fetch('/api/orders?table=' + tableNumber);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      tableOrders = Array.isArray(data) ? data : [];
      ordersLoaded = true;
      loading.style.display = 'none';
      renderTableOrders();
    } catch(e) {
      loading.style.display = 'none';
      body.innerHTML =
        '<div class="orders-empty"><p>Could not load orders.</p><small>Check your connection and try again.</small></div>';
    }
  }

  function timeAgo(dateStr) {
    const diff = Math.floor((Date.now() - new Date(dateStr)) / 1000);
    if (diff < 60) return 'Just now';
    if (diff < 3600) return Math.floor(diff / 60) + ' min ago';
    return Math.floor(diff / 3600) + 'h ago';
  }

  function pillClass(status) {
    return { pending: 'pill-pending', preparing: 'pill-preparing', done: 'pill-done',
             settled: 'pill-settled', cancelled: 'pill-cancelled' }[status] || 'pill-pending';
  }
  function pillLabel(status) {
    return { pending: 'Received', preparing: 'Preparing', done: 'Ready!',
             settled: 'Settled', cancelled: 'Cancelled' }[status] || status;
  }

  function stepperHTML(status) {
    const step = { pending: 0, preparing: 1, done: 2, settled: 2 }[status] ?? 0;
    const dot = (i) => {
      const cls = i < step ? 'done' : i === step ? 'active' : '';
      const icon = i < step ? '✓' : (i === 0 ? '📋' : i === 1 ? '🍳' : '✅');
      return `<div class="ost-dot ${cls}">${icon}</div>`;
    };
    const line = (i) => {
      const fill = step > i ? 'done-fill' : (step === i + 1 ? 'done-fill' : '');
      const w    = step > i ? '100%' : '0%';
      return `<div class="ost-line"><div class="ost-line-fill ${fill}" style="width:${w}"></div></div>`;
    };
    if (['settled','cancelled'].includes(status)) return '';
    return `
      <div class="order-stepper">${dot(0)}${line(0)}${dot(1)}${line(1)}${dot(2)}</div>
      <div class="ost-label-row"><span>Received</span><span>Preparing</span><span>Ready</span></div>`;
  }

  function renderOrderCard(order) {
    const itemsHTML = (order.items || []).map(i =>
      `<div class="oi-row">
        <span><span class="oi-qty">${i.quantity}×</span>${i.item_name}</span>
        <span>₹${i.item_price * i.quantity}</span>
      </div>`
    ).join('');

    return `
      <div class="order-card" id="oc-${order.id}">
        <div class="order-card-head">
          <div>
            <div class="order-card-id">Order #${String(order.id).padStart(4,'0')}</div>
            <div class="order-card-time">${timeAgo(order.created_at)}</div>
          </div>
          <div class="order-status-pill ${pillClass(order.status)}">${pillLabel(order.status)}</div>
        </div>
        ${stepperHTML(order.status)}
        <div class="order-items-body">${itemsHTML}</div>
        <div class="oi-total-row"><span>Total</span><span>₹${Number(order.total||0).toFixed(0)}</span></div>
      </div>`;
  }

  function renderTableOrders() {
    const active = tableOrders.filter(o => !['settled','cancelled'].includes(o.status));
    if (tableOrders.length === 0) {
      document.getElementById('ordersBody').innerHTML = `
        <div class="orders-empty">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
            <rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/>
          </svg>
          <p>No orders yet</p>
          <small>Your orders for Table ${tableNumber} will appear here.</small>
        </div>`;
      return;
    }
    document.getElementById('ordersBody').innerHTML =
      '<div class="orders-list">' + tableOrders.map(renderOrderCard).join('') + '</div>';
  }

  function updateOrderCard(order) {
    if (Number(order.table_number) !== Number(tableNumber)) return;
    // update or prepend in array
    const idx = tableOrders.findIndex(o => o.id === order.id);
    if (idx >= 0) tableOrders[idx] = order;
    else { tableOrders.unshift(order); }

    if (currentTab === 'orders') {
      renderTableOrders();
    } else {
      // show badge on Orders tab
      const active = tableOrders.filter(o => !['settled','cancelled'].includes(o.status)).length;
      const badge = document.getElementById('ordersBadge');
      if (active > 0) { badge.style.display = 'flex'; badge.textContent = active; }
      else badge.style.display = 'none';
    }
  }

  // Real-time item availability update
  function applyItemAvailability(id, available) {
    // Update the in-memory menu data
    for (const cat of menu) {
      const item = cat.items.find(i => i.id === id);
      if (item) { item.is_available = available; break; }
    }
    // Update the control cell (add/qty button → "Not Available" badge or vice versa)
    const ctrl = document.getElementById('ctrl-' + id);
    const card = document.getElementById('card-' + id);
    if (!ctrl) return;
    if (!available) {
      // Mark unavailable
      ctrl.innerHTML = `<span style="display:inline-flex;align-items:center;gap:4px;font-family:'Inter',sans-serif;font-size:0.68rem;font-weight:600;color:#92400e;background:#fef3c7;border:1px solid #fde68a;padding:5px 10px;border-radius:999px;white-space:nowrap;letter-spacing:0.03em;"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> Temporarily Unavailable</span>`;
      if (card) card.style.opacity = '0.55';
    } else {
      // Mark available again — show ADD button (qty likely 0)
      const qty = cart[id]?.qty || 0;
      ctrl.innerHTML = qty === 0
        ? `<button class="add-btn" onclick="addItem(${id})"><span>+</span> ADD</button>`
        : `<div class="qty-ctrl">
             <button class="qty-btn" onclick="changeQty(${id},-1)">−</button>
             <span class="qty-num">${qty}</span>
             <button class="qty-btn" onclick="changeQty(${id},1)">+</button>
           </div>`;
      if (card) card.style.opacity = '';
    }
    // If item was in cart and is now unavailable, remove it
    if (!available && cart[id]) {
      delete cart[id];
      updateCartBar();
    }
  }

  // Hook into socket for this table's order updates
  (function hookOrdersSocket() {
    function attachSocket() {
      if (typeof io !== 'undefined') {
        const s = io();
        s.on('new_order',        o => { if (Number(o.table_number) === tableNumber) updateOrderCard(o); });
        s.on('order_updated',    o => { if (Number(o.table_number) === tableNumber) updateOrderCard(o); });
        s.on('settings_updated', s => applyOrderingMode(s.ordering_enabled !== '0' && s.ordering_enabled !== 0 && s.ordering_enabled !== false));
        s.on('item_availability', ({ id, available }) => applyItemAvailability(id, available));
        return;
      }
      const sc = document.createElement('script');
      sc.src = '/socket.io/socket.io.js';
      sc.onload = () => {
        const s = io();
        s.on('new_order',        o => { if (Number(o.table_number) === tableNumber) updateOrderCard(o); });
        s.on('order_updated',    o => { if (Number(o.table_number) === tableNumber) updateOrderCard(o); });
        s.on('settings_updated', s => applyOrderingMode(s.ordering_enabled !== '0' && s.ordering_enabled !== 0 && s.ordering_enabled !== false));
        s.on('item_availability', ({ id, available }) => applyItemAvailability(id, available));
      };
      document.body.appendChild(sc);
    }
    attachSocket();
  })();

</script>

<!-- ── DESSERT STAGE ENGINE — pure CSS 3D + rAF, zero CDN deps ── -->
<script>
(function() {

  // REST positions mirror the CSS .slab-pos-* classes (2D only — no rotateY)
  var REST = [
    { x: -62, y: 12, s: 0.77 },
    { x: -32, y:  6, s: 0.89 },
    { x:   0, y:  0, s: 1.02 },
    { x:  32, y:  6, s: 0.89 },
    { x:  62, y: 12, s: 0.77 },
  ];

  var _slabs = [];

  window._threeCleanup = function() { _slabs = []; };

  // Slabs are already visible via CSS .slab-pos-* — just register them for focus interactions
  window._threeInit = function(trackEl, items) {
    window._threeCleanup();
    _slabs = items.slice(0, 5).map(function(item, i) {
      var el = trackEl.querySelector('.slab[data-id="' + item.id + '"]');
      if (!el) return null;
      return { el: el, id: item.id, rest: REST[i] || REST[2], focused: false };
    }).filter(Boolean);
  };

  // Slabs already visible; just reveal the hint text
  window._threeEntrance = function() {
    setTimeout(function() {
      var h = document.getElementById('stageHint');
      if (h) h.classList.add('visible');
    }, 700);
  };

  window._threeFocus = function(itemId) {
    var focused = null;
    _slabs.forEach(function(s) { if (s.id === itemId) focused = s; });
    if (!focused) return;
    focused.focused = !focused.focused;
    focused.el.classList.toggle('slab-focused', focused.focused);
    var any = _slabs.some(function(s) { return s.focused; });
    _slabs.forEach(function(s) {
      if (s.focused) {
        var r = s.rest;
        s.el.style.transform = 'translateX('+r.x+'px) translateY('+(r.y-28)+'px) scale('+(r.s*1.30)+')';
        s.el.style.opacity = '1';
      } else if (any) {
        var r = s.rest;
        s.el.style.transform = 'translateX('+r.x+'px) translateY('+(r.y+12)+'px) scale('+(r.s*0.82)+')';
        s.el.style.opacity = '0.32';
      } else {
        // Clear inline styles — CSS .slab-pos-* class takes over
        s.el.style.transform = '';
        s.el.style.opacity = '';
      }
    });
  };

  window._threeExit = function(cb) {
    _slabs.forEach(function(s) { s.el.style.opacity = '0'; });
    setTimeout(function() { if (cb) cb(); }, 350);
  };

  window._threeReset = function() {
    _slabs.forEach(function(s) {
      s.focused = false;
      s.el.classList.remove('slab-focused');
      s.el.style.transform = '';
      s.el.style.opacity = '';
    });
  };

  window._initStageWhenReady && window._initStageWhenReady();
  console.log('[dessert] CSS engine ready ✓');
})();
</script>
