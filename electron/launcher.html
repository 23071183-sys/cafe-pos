<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cafe POS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  :root{
    --bg:#14110E; --surface:#1F1B15; --gold:#C9A24B; --gold-d:#A8862F;
    --ink:#F3EEE2; --muted:#9A917E; --border:#342D22;
  }
  body {
    font-family:'Inter',sans-serif;
    background:var(--bg);
    background-image:radial-gradient(ellipse at 50% -10%, rgba(201,162,75,.14) 0%, transparent 55%);
    color:var(--ink); height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:2.4rem; -webkit-font-smoothing:antialiased;
    user-select:none;
  }
  .brand { font-family:'Fraunces',serif; font-size:2.6rem; font-weight:600; letter-spacing:-.02em; color:var(--ink); }
  .brand em { font-style:italic; color:var(--gold); }
  .sub { font-size:.72rem; color:var(--muted); letter-spacing:.24em; text-transform:uppercase; margin-top:-1.7rem; }
  .grid { display:grid; grid-template-columns:repeat(3,210px); gap:1.3rem; }
  .tile {
    background:var(--surface); border:1px solid var(--border);
    border-radius:20px; padding:2rem 1.5rem; display:flex; flex-direction:column;
    align-items:center; gap:.95rem; cursor:pointer; transition:all .2s; text-align:center;
    box-shadow:0 2px 10px rgba(0,0,0,.35);
  }
  .tile:hover { border-color:var(--gold); transform:translateY(-3px); box-shadow:0 12px 34px rgba(201,162,75,.18); }
  .tile:active { transform:translateY(0) scale(.98); }
  .tile-ico { width:58px; height:58px; border-radius:16px; display:flex; align-items:center; justify-content:center; }
  .tile-ico.pos   { background:var(--gold); }
  .tile-ico.admin { background:#2A241C; border:1px solid var(--border); }
  .tile-ico.menu  { background:#7B5E3B; }
  .tile-name { font-family:'Fraunces',serif; font-size:1.15rem; font-weight:600; color:var(--ink); }
  .tile-desc { font-size:.76rem; color:var(--muted); line-height:1.55; }
  .footer { position:fixed; bottom:1.3rem; font-size:.7rem; color:#6E6656; }
  .dot { display:inline-block; width:7px; height:7px; border-radius:50%; background:#7BAE6E; margin-right:6px; vertical-align:middle; }
</style>
</head>
<body>
  <div style="text-align:center">
    <div class="brand">POS <em>&amp;</em> Inventory</div>
  </div>
  <div class="sub">Wine Shop Management System</div>

  <div class="grid">
    <div class="tile" onclick="open('/counter')">
      <div class="tile-ico pos">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#14110E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="14" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="7" y1="15" x2="9" y2="15"/></svg>
      </div>
      <div class="tile-name">Billing Counter</div>
      <div class="tile-desc">Ring up sales &amp; settle bills</div>
    </div>

    <div class="tile" onclick="open('/admin')">
      <div class="tile-ico admin">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#C9A24B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      </div>
      <div class="tile-name">Admin Dashboard</div>
      <div class="tile-desc">Catalog, stock, CRM, reports &amp; settings</div>
    </div>

    <div class="tile" onclick="open('/menu?table=1')">
      <div class="tile-ico menu">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 8h14l-1 12a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 8z"/><path d="M9 8V5a3 3 0 0 1 6 0v3"/></svg>
      </div>
      <div class="tile-name">Storefront</div>
      <div class="tile-desc">Browse the customer catalog</div>
    </div>
  </div>

  <div class="footer"><span class="dot"></span>Running locally · offline-capable · Cmd/Ctrl+H to return here</div>

<script>
  const PORT = 4317;
  function open(p){ window.location.href = 'http://localhost:' + PORT + p; }
</script>
</body>
</html>
