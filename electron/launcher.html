<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cafe POS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  :root{
    --cream:#F0EEE6; --ivory:#FAF9F5; --clay:#D97757; --clay-d:#C15F3C;
    --ink:#1F1E1D; --muted:#83807A; --border:#E2DED3;
  }
  body {
    font-family:'Inter',sans-serif;
    background:var(--cream);
    color:var(--ink); height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:2.4rem; -webkit-font-smoothing:antialiased;
    user-select:none;
  }
  .brand { font-family:'Fraunces',serif; font-size:2.5rem; font-weight:600; letter-spacing:-.02em; color:var(--ink); }
  .brand em { font-style:italic; color:var(--clay); }
  .sub { font-size:.72rem; color:var(--muted); letter-spacing:.22em; text-transform:uppercase; margin-top:-1.7rem; }
  .grid { display:grid; grid-template-columns:repeat(3,210px); gap:1.3rem; }
  .tile {
    background:var(--ivory); border:1px solid var(--border);
    border-radius:20px; padding:2rem 1.5rem; display:flex; flex-direction:column;
    align-items:center; gap:.95rem; cursor:pointer; transition:all .2s; text-align:center;
    box-shadow:0 1px 3px rgba(31,30,29,.04);
  }
  .tile:hover { border-color:var(--clay); transform:translateY(-3px); box-shadow:0 10px 30px rgba(217,119,87,.16); }
  .tile:active { transform:translateY(0) scale(.98); }
  .tile-ico { width:58px; height:58px; border-radius:16px; display:flex; align-items:center; justify-content:center; }
  .tile-ico.pos   { background:var(--clay); }
  .tile-ico.admin { background:#1F1E1D; }
  .tile-ico.menu  { background:#B89B7A; }
  .tile-name { font-family:'Fraunces',serif; font-size:1.15rem; font-weight:600; color:var(--ink); }
  .tile-desc { font-size:.76rem; color:var(--muted); line-height:1.55; }
  .footer { position:fixed; bottom:1.3rem; font-size:.7rem; color:#A8A49B; }
  .dot { display:inline-block; width:7px; height:7px; border-radius:50%; background:#7C9A6B; margin-right:6px; vertical-align:middle; }
</style>
</head>
<body>
  <div style="text-align:center">
    <div class="brand"><em>Cafe</em> POS</div>
  </div>
  <div class="sub">Point of Sale &amp; Management</div>

  <div class="grid">
    <div class="tile" onclick="open('/counter')">
      <div class="tile-ico pos">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="14" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="7" y1="15" x2="9" y2="15"/></svg>
      </div>
      <div class="tile-name">POS Terminal</div>
      <div class="tile-desc">Take orders, run the kitchen &amp; settle bills</div>
    </div>

    <div class="tile" onclick="open('/admin')">
      <div class="tile-ico admin">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      </div>
      <div class="tile-name">Admin Dashboard</div>
      <div class="tile-desc">Menu, inventory, CRM, reports &amp; settings</div>
    </div>

    <div class="tile" onclick="open('/menu?table=1')">
      <div class="tile-ico menu">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
      </div>
      <div class="tile-name">Customer Menu</div>
      <div class="tile-desc">Preview the QR ordering screen</div>
    </div>
  </div>

  <div class="footer"><span class="dot"></span>Running locally · offline-capable · Cmd/Ctrl+H to return here</div>

<script>
  const PORT = 4317;
  function open(p){ window.location.href = 'http://localhost:' + PORT + p; }
</script>
</body>
</html>
