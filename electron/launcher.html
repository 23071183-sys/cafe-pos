<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cafe POS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Inter',sans-serif;
    background:#0f172a;
    background-image:radial-gradient(ellipse at 50% 0%, rgba(79,70,229,.22) 0%, transparent 60%);
    color:#f8fafc; height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:2.5rem; -webkit-font-smoothing:antialiased;
    user-select:none;
  }
  .brand { font-size:2rem; font-weight:800; letter-spacing:-.03em; }
  .brand em { font-style:normal; color:#ff6b3d; }
  .sub { font-size:.8rem; color:#94a3b8; letter-spacing:.18em; text-transform:uppercase; margin-top:-1.8rem; }
  .grid { display:grid; grid-template-columns:repeat(3,200px); gap:1.4rem; }
  .tile {
    background:rgba(255,255,255,.04); border:1.5px solid rgba(255,255,255,.08);
    border-radius:18px; padding:2rem 1.5rem; display:flex; flex-direction:column;
    align-items:center; gap:1rem; cursor:pointer; transition:all .18s; text-align:center;
  }
  .tile:hover { background:rgba(99,102,241,.12); border-color:#6366f1; transform:translateY(-3px); }
  .tile:active { transform:translateY(0) scale(.98); }
  .tile-ico { width:56px; height:56px; border-radius:14px; display:flex; align-items:center; justify-content:center; }
  .tile-ico.pos   { background:#4f46e5; }
  .tile-ico.admin { background:#0ea5e9; }
  .tile-ico.menu  { background:#f97316; }
  .tile-name { font-size:1.05rem; font-weight:700; }
  .tile-desc { font-size:.74rem; color:#94a3b8; line-height:1.5; }
  .footer { position:fixed; bottom:1.2rem; font-size:.7rem; color:#475569; }
  .dot { display:inline-block; width:7px; height:7px; border-radius:50%; background:#22c55e; margin-right:5px; vertical-align:middle; }
</style>
</head>
<body>
  <div style="text-align:center">
    <div class="brand"><em>Cafe</em> POS</div>
  </div>
  <div class="sub">Point of Sale &amp; Management</div>

  <div class="grid">
    <div class="tile" onclick="open('/counter')">
      <div class="tile-ico pos">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="14" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="7" y1="15" x2="9" y2="15"/></svg>
      </div>
      <div class="tile-name">POS Terminal</div>
      <div class="tile-desc">Take orders, run the kitchen &amp; settle bills</div>
    </div>

    <div class="tile" onclick="open('/admin')">
      <div class="tile-ico admin">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      </div>
      <div class="tile-name">Admin Dashboard</div>
      <div class="tile-desc">Menu, inventory, CRM, reports &amp; settings</div>
    </div>

    <div class="tile" onclick="open('/menu?table=1')">
      <div class="tile-ico menu">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
      </div>
      <div class="tile-name">Customer Menu</div>
      <div class="tile-desc">Preview the QR ordering screen</div>
    </div>
  </div>

  <div class="footer"><span class="dot"></span>Running locally · offline-capable · Cmd/Ctrl+H to return here</div>

<script>
  const PORT = 4317;
  function open(p){ window.location.href = 'http://localhost:' + PORT + p; }
</script>
</body>
</html>
